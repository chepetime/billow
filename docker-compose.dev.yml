services:
  postgres:
    image: postgres:16-alpine
    container_name: billow-postgres
    environment:
      POSTGRES_DB: billow
      POSTGRES_USER: billow
      POSTGRES_PASSWORD: billow-password
    ports:
      - "5432:5432"
    volumes:
      - billow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billow -d billow"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  billow_postgres_data:
