name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  app:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: billow
          POSTGRES_USER: billow
          POSTGRES_PASSWORD: billow-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U billow -d billow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://billow:billow-password@localhost:5432/billow
      BETTER_AUTH_SECRET: ci-only-secret-with-at-least-32-characters
      BETTER_AUTH_URL: http://localhost:3000

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          # setup-node v5 auto-caches the package manager from the
          # `packageManager` field, which probes for pnpm before it is
          # installed. We install pnpm via corepack below, so disable it.
          # https://github.com/actions/setup-node/issues/1357
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm run db:generate

      - name: Validate Prisma schema
        run: pnpm run db:validate

      - name: Apply migrations
        run: pnpm --filter @billow/db db:migrate

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test:run

      - name: Build
        run: pnpm run build
