name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  app:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: billow
          POSTGRES_USER: billow
          POSTGRES_PASSWORD: billow-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U billow -d billow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://billow:billow-password@localhost:5432/billow
      BETTER_AUTH_SECRET: ci-only-secret-with-at-least-32-characters
      BETTER_AUTH_URL: http://localhost:3000

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm run db:generate

      - name: Validate Prisma schema
        run: pnpm run db:validate

      - name: Apply migrations
        run: pnpm run db:migrate

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test:run

      - name: Build
        run: pnpm run build
