name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        task: [lint, test:run, build]

    env:
      # Build compiles the better-auth route; give it a valid dummy secret.
      BETTER_AUTH_SECRET: ci-only-secret-with-at-least-32-characters
      BETTER_AUTH_URL: http://localhost:3000

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up workspace
        uses: ./.github/actions/setup

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ matrix.task }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ matrix.task }}-

      - name: Generate Prisma client
        run: pnpm run db:generate

      - name: Run ${{ matrix.task }}
        run: pnpm run ${{ matrix.task }}

  migrations:
    name: migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: billow
          POSTGRES_USER: billow
          POSTGRES_PASSWORD: billow-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U billow -d billow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://billow:billow-password@localhost:5432/billow

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up workspace
        uses: ./.github/actions/setup

      - name: Validate Prisma schema
        run: pnpm run db:validate

      - name: Apply migrations
        run: pnpm --filter @billow/db db:migrate
